image:
  repository: myregistry/inventory
  tag: "latest"
service:
  port: 80
connectionString: "Host=postgres;Port=5432;Database=inventorydb;Username=postgres;Password=postgres"
authentication:
  issuer: "http://authcenter/"
  authority: "http://authcenter/"
  audience: "eztrade-platform"
elasticLogging:
  enabled: true
  enableConsoleSink: true
  logDirectory: "/app/logs"
  minimumLevel: "Information"
  retainedFileCountLimit: 14
nacos:
  enabled: true
  loadConfiguration: false
  registerService: true
  serverAddress: "http://nacos:8848"
  namespaceId: "public"
  group: "EZTRADE_PLATFORM"
  clusterName: "DEFAULT"
  serviceName: "inventory-api"
  configDataId: "inventory-api.json"
  instancePort: 80
dapr:
  enabled: true
  appId: inventory-api
  appPort: 80
  config: default
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
