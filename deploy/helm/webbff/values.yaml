image:
  repository: myregistry/webbff
  tag: "latest"
service:
  port: 80
authentication:
  issuer: "http://authcenter/"
  authority: "http://authcenter/"
  audience: "eztrade-platform"
elasticLogging:
  enabled: true
  enableConsoleSink: true
  logDirectory: "/app/logs"
  minimumLevel: "Information"
  retainedFileCountLimit: 14
nacos:
  enabled: true
  loadConfiguration: false
  registerService: true
  serverAddress: "http://nacos:8848"
  namespaceId: "public"
  group: "EZTRADE_PLATFORM"
  clusterName: "DEFAULT"
  serviceName: "web-bff"
  configDataId: "web-bff.json"
  instancePort: 80
services:
  orders: "http://orders"
  inventory: "http://inventory"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
