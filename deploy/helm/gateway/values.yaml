image:
  repository: myregistry/gateway
  tag: "latest"
service:
  port: 80
authentication:
  issuer: "http://authcenter/"
  authority: "http://authcenter/"
  audience: "eztrade-platform"
elasticLogging:
  enabled: true
  enableConsoleSink: true
  logDirectory: "/app/logs"
  minimumLevel: "Information"
  retainedFileCountLimit: 14
nacos:
  enabled: true
  loadConfiguration: false
  registerService: true
  serverAddress: "http://nacos:8848"
  namespaceId: "public"
  group: "EZTRADE_PLATFORM"
  clusterName: "DEFAULT"
  serviceName: "api-gateway"
  configDataId: "api-gateway.json"
  instancePort: 80
services:
  authCenter: "http://authcenter"
  orders: "http://orders"
  inventory: "http://inventory"
  payments: "http://payments"
  bff: "http://webbff"
resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
