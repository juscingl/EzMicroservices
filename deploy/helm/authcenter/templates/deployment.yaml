apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authcenter.fullname" . }}
  labels: {{- include "authcenter.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels: {{- include "authcenter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "authcenter.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: authcenter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: ConnectionStrings__Default
              value: "{{ .Values.connectionString }}"
            - name: Authentication__Issuer
              value: "{{ .Values.authentication.issuer }}"
            - name: Authentication__Authority
              value: "{{ .Values.authentication.authority }}"
            - name: Authentication__Audience
              value: "{{ .Values.authentication.audience }}"
            - name: ElasticLogging__Enabled
              value: "{{ .Values.elasticLogging.enabled }}"
            - name: ElasticLogging__EnableConsoleSink
              value: "{{ .Values.elasticLogging.enableConsoleSink }}"
            - name: ElasticLogging__LogDirectory
              value: "{{ .Values.elasticLogging.logDirectory }}"
            - name: ElasticLogging__MinimumLevel
              value: "{{ .Values.elasticLogging.minimumLevel }}"
            - name: ElasticLogging__RetainedFileCountLimit
              value: "{{ .Values.elasticLogging.retainedFileCountLimit }}"
            - name: Nacos__Enabled
              value: "{{ .Values.nacos.enabled }}"
            - name: Nacos__LoadConfiguration
              value: "{{ .Values.nacos.loadConfiguration }}"
            - name: Nacos__RegisterService
              value: "{{ .Values.nacos.registerService }}"
            - name: Nacos__ServerAddress
              value: "{{ .Values.nacos.serverAddress }}"
            - name: Nacos__NamespaceId
              value: "{{ .Values.nacos.namespaceId }}"
            - name: Nacos__Group
              value: "{{ .Values.nacos.group }}"
            - name: Nacos__ClusterName
              value: "{{ .Values.nacos.clusterName }}"
            - name: Nacos__ServiceName
              value: "{{ .Values.nacos.serviceName }}"
            - name: Nacos__ConfigDataId
              value: "{{ .Values.nacos.configDataId }}"
            - name: Nacos__InstancePort
              value: "{{ .Values.nacos.instancePort }}"
            - name: Seed__Admin__UserName
              value: "{{ .Values.seedAdmin.userName }}"
            - name: Seed__Admin__Email
              value: "{{ .Values.seedAdmin.email }}"
            - name: Seed__Admin__Password
              value: "{{ .Values.seedAdmin.password }}"
            - name: Seed__Clients__1__ClientSecret
              value: "{{ .Values.seedClients.serviceClientSecret }}"
          resources: {{- toYaml .Values.resources | nindent 12 }}
