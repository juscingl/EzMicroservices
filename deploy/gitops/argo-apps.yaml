apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ezmicroservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/ezmicroservices
    targetRevision: HEAD
    path: deploy/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
